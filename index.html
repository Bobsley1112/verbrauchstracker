<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12151a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LocalMeterLog">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;LocalMeterLog&quot;,&quot;short_name&quot;:&quot;MeterLog&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#12151a&quot;,&quot;theme_color&quot;:&quot;#12151a&quot;}">
<title>LocalMeterLog</title>
<style>
  :root {
    --bg:#f2f4f7; --card:#ffffff; --text:#1c2430; --muted:#66707f;
    --line:#e3e7ee; --input:#f5f7fa; --danger:#c0392b;
    --strom:#e3a800; --gas:#e8590c; --wasser:#1c7ed6;
    --oel:#795548; --pellets:#8d6e63; --fernwaerme:#d32f2f;
    --accent:var(--strom); --accent-soft:rgba(227,168,0,.14);
    --shadow:0 1px 3px rgba(15,23,42,.08);
  }
  html[data-theme="dark"] {
    --bg:#12151a; --card:#1b2027; --text:#e8ebef; --muted:#8a93a0;
    --line:#2a313b; --input:#12161c; --danger:#e05a4c;
    --strom:#f5c02c; --gas:#ff7038; --wasser:#3d96ec;
    --oel:#a1887f; --pellets:#bcaaa4; --fernwaerme:#ef5350;
    --shadow:0 1px 3px rgba(0,0,0,.35);
  }

  .success-flash {
    background-color: #27ae60 !important;
    color: #ffffff !important;
    border-color: #27ae60 !important;
    transition: background-color 0.2s ease-out, color 0.2s ease-out !important;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:system-ui,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-tap-highlight-color:transparent;
    padding:14px 14px calc(24px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:14px;}

  header{display:flex; align-items:center; justify-content:space-between; padding:4px 2px;}
  header h1{font-size:1.25rem; font-weight:800; letter-spacing:-.01em;}
  header h1 small{display:block; font-size:.72rem; font-weight:500; color:var(--muted); letter-spacing:.04em;}
  .iconbtn{
    border:1px solid var(--line); background:var(--card); color:var(--text);
    width:40px; height:40px; border-radius:12px; font-size:1.05rem; cursor:pointer;
  }

  .seg{display:grid; grid-auto-flow:column; grid-auto-columns:1fr; gap:6px; background:var(--card);
       border:1px solid var(--line); border-radius:14px; padding:6px; box-shadow:var(--shadow); overflow-x:auto;}
  .seg button{
    border:0; border-radius:10px; padding:10px 6px; font-size:.9rem; font-weight:700;
    background:transparent; color:var(--muted); cursor:pointer; transition:background .15s,color .15s;
    white-space:nowrap;
  }
  .seg button.active{background:var(--accent); color:#fff;}
  html[data-theme="dark"] .seg button.active{color:#101418;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;
        padding:14px; box-shadow:var(--shadow);}
  .card h2{font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
           color:var(--muted); margin-bottom:10px;}

  .stats{display:grid; grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); gap:8px;}
  .stat{background:var(--accent-soft); border-radius:12px; padding:10px 8px; text-align:center;}
  .stat b{display:block; font-size:1.05rem; font-variant-numeric:tabular-nums;}
  .stat span{font-size:.68rem; color:var(--muted);}

  #meterinfo{font-size:.78rem; color:var(--muted); margin-bottom:6px; min-height:1.1em;}
  #chartbox{min-height:190px;}
  #chartbox svg{width:100%; height:auto; display:block;}
  .empty{color:var(--muted); font-size:.9rem; text-align:center; padding:34px 10px;}

  form .row, .row{display:grid; grid-template-columns:repeat(auto-fit, minmax(130px, 1fr)); gap:8px; margin-top:8px;}
  label{display:block; font-size:.72rem; font-weight:600; color:var(--muted); margin:0 0 4px 2px;}
  input{
    width:100%; border:1px solid var(--line); background:var(--input); color:var(--text);
    border-radius:10px; padding:10px; font-size:1rem; font-variant-numeric:tabular-nums;
  }
  input:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:transparent;}
  .btn{
    width:100%; border:0; border-radius:12px; padding:13px; margin-top:12px;
    font-size:1rem; font-weight:700; color:#fff; background:var(--accent); cursor:pointer;
  }
  html[data-theme="dark"] .btn{color:#101418;}
  .btn.secondary{background:var(--card); color:var(--text); border:1px solid var(--line); margin-top:8px;}
  html[data-theme="dark"] .btn.secondary{color:var(--text);}

  .entry{border-top:1px solid var(--line); padding:10px 2px;}
  .entry:first-of-type{border-top:0;}
  .entry .head{display:flex; align-items:baseline; gap:8px;}
  .entry .head b{font-size:.95rem;}
  .entry .head span{font-size:.75rem; color:var(--muted); flex:1;}
  .entry .del{border:0; background:none; color:var(--danger); font-size:1rem; cursor:pointer; padding:4px 6px;}
  .vals{display:grid; grid-template-columns:repeat(auto-fit, minmax(96px, 1fr)); gap:6px; margin-top:6px;}
  .val{border:1px solid var(--line); border-radius:10px; padding:6px 8px;}
  .val small{display:block; font-size:.65rem; color:var(--muted);}
  .val b{font-size:.9rem; font-variant-numeric:tabular-nums; font-weight:600;}
  .val i{display:block; font-style:normal; font-size:.72rem; font-weight:700; font-variant-numeric:tabular-nums;}
  .val i.wechsel{color:var(--muted); font-weight:500;}

  .status{font-size:.8rem; color:var(--muted); text-align:center; min-height:1.1em; margin-top:8px;}
  footer{text-align:center; font-size:.72rem; color:var(--muted); padding-top:4px;}
  #importfile{display:none;}

  .meterbox{display:flex; flex-direction:column; gap:6px; border:1px solid var(--line);
            border-radius:10px; padding:8px 10px; min-width:210px; flex:1;}
  .meterbox.new{border-style:dashed;}
  .meterbox .toprow{display:flex; align-items:center; gap:8px;}
  .meterbox .toprow label{display:flex; align-items:center; gap:6px; font-size:.85rem;
            font-weight:600; color:var(--text); cursor:pointer; flex:1; margin:0;}
  .meterbox .bidilabel{display:flex; align-items:center; gap:6px; font-size:.72rem;
            color:var(--muted); cursor:pointer; font-weight:500;}
  .meterbox input[type="checkbox"]{width:auto; transform:scale(1.15); flex:none;}
  .meterbox input[type="text"], .meterbox input:not([type]){font-size:.82rem; padding:7px 8px;}
  .meterbox .rmbtn{border:0; background:none; color:var(--danger); font-size:.95rem; cursor:pointer; padding:2px 4px;}

  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>LocalMeterLog<small>Strom · Gas · Wasser · Öl · Pellets · Fernwärme</small></h1>
    <button class="iconbtn" id="themebtn" title="Hell/Dunkel umschalten" aria-label="Design umschalten">◐</button>
  </header>

  <section class="card">
    <h2>Zähler verwalten</h2>
    <div id="settings_toggles" style="display:flex; flex-wrap:wrap; gap:12px; margin-top:8px;"></div>
  </section>

  <section class="card">
    <h2>Tarife (Arbeitspreis)</h2>
    <div id="settings_prices" class="row"></div>
  </section>

  <nav class="seg" id="seg" aria-label="Verbrauchsart wählen"></nav>

  <section class="card">
    <h2>Zeitraum filtern</h2>
    <div class="row" style="margin-bottom:12px;">
      <div>
        <label for="f_start">Von</label>
        <input type="date" id="f_start">
      </div>
      <div>
        <label for="f_ende">Bis</label>
        <input type="date" id="f_ende">
      </div>
    </div>
    <div class="seg">
      <button type="button" id="btn_filter_alle" class="active">Gesamtzeitraum</button>
      <button type="button" id="btn_filter_jahr">Letzte 365 Tage</button>
      <button type="button" id="btn_filter_letztesjahr">Letztes Jahr</button>
    </div>
  </section>

  <section class="card">
    <div id="meterinfo"></div>
    <div class="stats" id="stats"></div>
    <div id="chartbox" role="img" aria-label="Verbrauchsdiagramm"></div>
  </section>

  <section class="card">
    <h2>Neuer Zählerstand</h2>
    <form id="form">
      <label for="f_datum">Datum</label>
      <input type="date" id="f_datum" required>
      <div class="row" id="form_inputs"></div>
      <button type="submit" class="btn">Zählerstand speichern</button>
    </form>
    <div class="status" id="status" aria-live="polite"></div>
  </section>

  <section class="card">
    <h2>Einträge <span id="count" style="text-transform:none; font-weight:500;"></span></h2>
    <div id="list"></div>
  </section>


  <section class="card">
    <h2>Daten</h2>
    <button class="btn secondary" id="xlsxbtn">Nach Excel exportieren (.xlsx)</button>
    <button class="btn secondary" id="csvbtn">Nach CSV exportieren (.csv)</button>
    <button class="btn secondary" id="backupbtn">Sicherung speichern (.json)</button>
    <button class="btn secondary" id="importbtn">Sicherung laden (.json)</button>
    <input type="file" id="importfile" accept=".json,application/json">
  </section>

  <footer>Alle Daten bleiben lokal auf diesem Gerät gespeichert.</footer>
</div>

<script>
"use strict";

const MASTER_UTILITIES = {
  strom:      {label:"Strom",      einheit:"kWh", cssvar:"--strom"},
  gas:        {label:"Gas",        einheit:"m³",  cssvar:"--gas"},
  wasser:     {label:"Wasser",     einheit:"m³",  cssvar:"--wasser"},
  oel:        {label:"Heizöl",     einheit:"l",   cssvar:"--oel"},
  pellets:    {label:"Pellets",    einheit:"kg",  cssvar:"--pellets"},
  fernwaerme: {label:"Fernwärme",  einheit:"kWh", cssvar:"--fernwaerme"}
};
const COLOR_PALETTE = ["#7c4dff","#00bcd4","#e91e63","#4caf50","#ff9800","#9c27b0","#607d8b","#3f51b5","#009688","#f44336"];
const CHART_COLOR_AB = "#00bfa5";

const LS_DATA="lml_readings", LS_THEME="lml_theme", LS_UTIL="lml_util", LS_ACTIVE="lml_active",
      LS_CUSTOM="lml_custom_utilities", LS_METERNR="lml_meternumbers", LS_BIDI="lml_bidirectional",
      LS_PRICES="lml_prices", LS_PRICES_AB="lml_prices_ab";

let customUtilities = JSON.parse(localStorage.getItem(LS_CUSTOM)) || {};
let meterNumbers = JSON.parse(localStorage.getItem(LS_METERNR)) || {};
let bidirectional = JSON.parse(localStorage.getItem(LS_BIDI)) || [];
let activeKeys = JSON.parse(localStorage.getItem(LS_ACTIVE)) || ["strom", "gas", "wasser"];
let UTILITIES = {};
let KEYS = [];

function allUtilDefs(){ return Object.assign({}, MASTER_UTILITIES, customUtilities); }

function updateActiveUtilities() {
  const all = allUtilDefs();
  UTILITIES = {};
  KEYS = activeKeys.filter(k => all[k]);
  for (const k of KEYS) UTILITIES[k] = all[k];
}
updateActiveUtilities();

let readings = [];
let currentUtil = localStorage.getItem(LS_UTIL);
if (!activeKeys.includes(currentUtil)) currentUtil = activeKeys[0];

let filterStart = "";
let filterEnd = "";
let prices = JSON.parse(localStorage.getItem(LS_PRICES)) || {};
let pricesAb = JSON.parse(localStorage.getItem(LS_PRICES_AB)) || {};

/* ---------- Hilfsfunktionen ---------- */
function parseNumber(t){
  t = (t||"").trim().replace(/\s/g,"");
  if(t === "") return null;
  t = t.replace(/\./g, t.includes(",") ? "" : ".").replace(",",".");
  const v = parseFloat(t);
  return isFinite(v) ? v : null;
}
function fmt(v, dec){
  if(v === null || v === undefined) return "–";
  return v.toLocaleString("de-DE",{minimumFractionDigits:0, maximumFractionDigits:dec===undefined?1:dec});
}
function deDate(iso){
  const [y,m,d] = iso.split("-");
  return d + "." + m + "." + y;
}
function daysBetween(a,b){
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function flashButton(btnId) {
  const el = document.getElementById(btnId) || document.querySelector(btnId);
  if(!el) return;
  el.classList.add("success-flash");
  setTimeout(() => el.classList.remove("success-flash"), 800);
}
function utilColorValue(k){
  const def = UTILITIES[k] || allUtilDefs()[k];
  if(!def) return "#888888";
  if(def.cssvar) return getComputedStyle(document.documentElement).getPropertyValue(def.cssvar).trim();
  return def.color || "#888888";
}
function slugify(s){
  s = s.toLowerCase().trim()
    .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")
    .replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
  return s || "zaehler";
}

/* ---------- Filter-Logik ---------- */
function getFilteredPeriods() {
  return computeConsumption().filter(p => {
    if (filterStart && p.datum < filterStart) return false;
    if (filterEnd && p.datum > filterEnd) return false;
    return true;
  });
}

function getFilteredReadings() {
  return readings.filter(r => {
    if (filterStart && r.datum < filterStart) return false;
    if (filterEnd && r.datum > filterEnd) return false;
    return true;
  });
}

function applyFilter() {
  filterStart = document.getElementById("f_start").value;
  filterEnd = document.getElementById("f_ende").value;
  renderAll();
}

function handleManualFilter() {
  document.querySelectorAll("#btn_filter_alle, #btn_filter_jahr, #btn_filter_letztesjahr").forEach(b => b.classList.remove("active"));

  const start = document.getElementById("f_start").value;
  const end = document.getElementById("f_ende").value;
  if(!start && !end) {
    document.getElementById("btn_filter_alle").classList.add("active");
  }

  applyFilter();
}

function setQuickFilter(mode) {
  let startStr, endStr;

  if (mode === 365) {
    const d = new Date();
    endStr = d.toISOString().slice(0,10);
    d.setDate(d.getDate() - 365);
    startStr = d.toISOString().slice(0,10);
  } else if (mode === 'letztesJahr') {
    const year = new Date().getFullYear() - 1;
    startStr = year + "-01-01";
    endStr = year + "-12-31";
  }

  document.getElementById("f_start").value = startStr;
  document.getElementById("f_ende").value = endStr;

  document.querySelectorAll("#btn_filter_alle, #btn_filter_jahr, #btn_filter_letztesjahr").forEach(b => b.classList.remove("active"));
  if (mode === 365) document.getElementById("btn_filter_jahr").classList.add("active");
  if (mode === 'letztesJahr') document.getElementById("btn_filter_letztesjahr").classList.add("active");

  applyFilter();
}

/* ---------- Daten ---------- */
function loadData(){
  try{
    const raw = JSON.parse(localStorage.getItem(LS_DATA) || "[]");
    readings = sanitize(raw);
  }catch(e){ readings = []; }
}
function sanitize(raw){
  const out = [];
  const all = allUtilDefs();
  for(const r of (Array.isArray(raw) ? raw : [])){
    let d = (r.datum || "").trim();
    const m = d.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(m) d = m[3] + "-" + m[2].padStart(2,"0") + "-" + m[1].padStart(2,"0");
    if(!/^\d{4}-\d{2}-\d{2}$/.test(d)) continue;
    const row = {datum:d};
    for(const k in all){
      const v = r[k];
      row[k] = (typeof v === "number" && isFinite(v)) ? v :
               (typeof v === "string" ? parseNumber(v) : null);
      if(bidirectional.includes(k)){
        const v2 = r[k+"_ab"];
        row[k+"_ab"] = (typeof v2 === "number" && isFinite(v2)) ? v2 :
                        (typeof v2 === "string" ? parseNumber(v2) : null);
      }
    }
    out.push(row);
  }
  out.sort((a,b)=> a.datum < b.datum ? -1 : 1);
  return out;
}
function saveData(){
  localStorage.setItem(LS_DATA, JSON.stringify(readings));
}
function computePeriodValue(a,b){
  if(a === null || b === null || a === undefined || b === undefined) return {val:null, wechsel:false};
  if(b - a < 0) return {val:null, wechsel:true};
  return {val:b - a, wechsel:false};
}
function computeConsumption(){
  const periods = [];
  const all = allUtilDefs();
  for(let i=1; i<readings.length; i++){
    const prev = readings[i-1], cur = readings[i];
    const row = {datum:cur.datum, tage:daysBetween(prev.datum, cur.datum)};
    for(const k in all){
      const r1 = computePeriodValue(prev[k], cur[k]);
      row[k] = r1.val; row[k+"_wechsel"] = r1.wechsel;
      if(bidirectional.includes(k)){
        const r2 = computePeriodValue(prev[k+"_ab"], cur[k+"_ab"]);
        row[k+"_ab"] = r2.val; row[k+"_ab_wechsel"] = r2.wechsel;
      }
    }
    periods.push(row);
  }
  return periods;
}

/* ---------- Aktionen ---------- */
function addReading(ev){
  ev.preventDefault();
  const d = document.getElementById("f_datum").value;
  if(!d){ setStatus("Bitte ein Datum wählen."); return; }
  const vals = {};
  for(const k of KEYS){
    vals[k] = parseNumber(document.getElementById("f_"+k).value);
    if(bidirectional.includes(k)){
      const elAb = document.getElementById("f_"+k+"_ab");
      vals[k+"_ab"] = elAb ? parseNumber(elAb.value) : null;
    }
  }
  const allNull = KEYS.every(k => vals[k] === null && (!bidirectional.includes(k) || vals[k+"_ab"] === null));
  if(allNull){
    setStatus("Bitte mindestens einen Zählerstand eingeben."); return;
  }
  const existing = readings.find(r => r.datum === d);
  if(existing){
    if(!confirm("Für den " + deDate(d) + " existiert bereits ein Eintrag. Überschreiben?")) return;
    for(const k of KEYS){
      if(vals[k] !== null) existing[k] = vals[k];
      if(bidirectional.includes(k) && vals[k+"_ab"] !== null) existing[k+"_ab"] = vals[k+"_ab"];
    }
  }else{
    readings.push({datum:d, ...vals});
  }
  readings.sort((a,b)=> a.datum < b.datum ? -1 : 1);
  saveData();
  for(const k of KEYS){
    document.getElementById("f_"+k).value = "";
    if(bidirectional.includes(k)){
      const elAb = document.getElementById("f_"+k+"_ab");
      if(elAb) elAb.value = "";
    }
  }
  setStatus("Eintrag vom " + deDate(d) + " gespeichert.");
  flashButton("#form button[type='submit']");
  renderAll();
}
function deleteReading(iso){
  if(!confirm("Eintrag vom " + deDate(iso) + " wirklich löschen?")) return;
  readings = readings.filter(r => r.datum !== iso);
  saveData();
  setStatus("Eintrag gelöscht.");
  renderAll();
}
function setStatus(t){
  const el = document.getElementById("status");
  el.textContent = t;
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.textContent = ""; }, 6000);
}

/* ---------- Zähler verwalten ---------- */
function renderSettings() {
  const container = document.getElementById("settings_toggles");
  const all = allUtilDefs();
  let html = "";
  for (const k in all) {
    const def = all[k];
    const isChecked = activeKeys.includes(k) ? "checked" : "";
    const isCustom = !MASTER_UTILITIES[k];
    const isBidiChecked = bidirectional.includes(k) ? "checked" : "";
    const nrVal = (meterNumbers[k] || "").replace(/"/g,"&quot;");
    html += `
      <div class="meterbox">
        <div class="toprow">
          <label>
            <input type="checkbox" value="${k}" ${isChecked} onchange="toggleUtility(this)">
            ${def.label}
          </label>
          ${isCustom ? `<button type="button" class="rmbtn" title="Zähler löschen" aria-label="Zähler löschen" onclick="deleteCustomUtility('${k}')">✕</button>` : ""}
        </div>
        <label class="bidilabel">
          <input type="checkbox" ${isBidiChecked} onchange="toggleBidirectional('${k}', this)">
          Zweirichtungszähler (Bezug/Einspeisung)
        </label>
        <input type="text" placeholder="Zähler-Nr." value="${nrVal}" onchange="saveMeterNumber('${k}', this.value)">
      </div>
    `;
  }
  html += `
    <div class="meterbox new">
      <b style="font-size:.8rem;">+ Neuen Zähler anlegen</b>
      <input type="text" id="new_meter_name" placeholder="Name, z. B. Wärmepumpe">
      <input type="text" id="new_meter_unit" placeholder="Einheit, z. B. kWh">
      <label class="bidilabel">
        <input type="checkbox" id="new_meter_bidi"> Zweirichtungszähler (Bezug/Einspeisung)
      </label>
      <button type="button" class="btn secondary" style="margin-top:0;" onclick="addCustomUtility()">Zähler anlegen</button>
    </div>
  `;
  container.innerHTML = html;
}

function toggleUtility(checkbox) {
  if (checkbox.checked) {
    if (!activeKeys.includes(checkbox.value)) activeKeys.push(checkbox.value);
  } else {
    if (activeKeys.length <= 1) {
      setStatus("Mindestens ein Zähler muss aktiv bleiben.");
      checkbox.checked = true;
      return;
    }
    activeKeys = activeKeys.filter(k => k !== checkbox.value);
  }
  localStorage.setItem(LS_ACTIVE, JSON.stringify(activeKeys));
  updateActiveUtilities();
  if (!activeKeys.includes(currentUtil)) {
    currentUtil = activeKeys[0];
    localStorage.setItem(LS_UTIL, currentUtil);
  }
  renderSettings();
  renderPrices();
  renderFormInputs();
  renderAll();
}

function toggleBidirectional(key, checkbox){
  if(checkbox.checked){
    if(!bidirectional.includes(key)) bidirectional.push(key);
  }else{
    bidirectional = bidirectional.filter(k => k !== key);
  }
  localStorage.setItem(LS_BIDI, JSON.stringify(bidirectional));
  renderPrices();
  renderFormInputs();
  renderAll();
}

function saveMeterNumber(key, val){
  val = (val||"").trim();
  if(val) meterNumbers[key] = val; else delete meterNumbers[key];
  localStorage.setItem(LS_METERNR, JSON.stringify(meterNumbers));
  renderMeterInfo();
}

function addCustomUtility(){
  const nameEl = document.getElementById("new_meter_name");
  const unitEl = document.getElementById("new_meter_unit");
  const bidiEl = document.getElementById("new_meter_bidi");
  const name = nameEl.value.trim();
  const unit = unitEl.value.trim() || "Einheit";
  if(!name){ setStatus("Bitte einen Namen für den neuen Zähler eingeben."); return; }
  const all = allUtilDefs();
  let base = slugify(name), key = base, i = 2;
  while(all[key]) key = base + "_" + (i++);
  const colorIndex = Object.keys(customUtilities).length % COLOR_PALETTE.length;
  customUtilities[key] = {label:name, einheit:unit, color:COLOR_PALETTE[colorIndex]};
  localStorage.setItem(LS_CUSTOM, JSON.stringify(customUtilities));
  activeKeys.push(key);
  localStorage.setItem(LS_ACTIVE, JSON.stringify(activeKeys));
  if(bidiEl.checked){
    bidirectional.push(key);
    localStorage.setItem(LS_BIDI, JSON.stringify(bidirectional));
  }
  updateActiveUtilities();
  setStatus("Zähler „" + name + "“ angelegt.");
  renderSettings();
  renderPrices();
  renderFormInputs();
  renderAll();
}

function deleteCustomUtility(key){
  const def = customUtilities[key];
  if(!def) return;
  if(!confirm("Zähler „" + def.label + "“ inkl. Definition entfernen? Bereits erfasste Messwerte bleiben in den Daten, werden aber nicht mehr angezeigt.")) return;
  delete customUtilities[key];
  activeKeys = activeKeys.filter(k => k !== key);
  bidirectional = bidirectional.filter(k => k !== key);
  delete meterNumbers[key];
  delete prices[key];
  delete pricesAb[key];
  localStorage.setItem(LS_CUSTOM, JSON.stringify(customUtilities));
  localStorage.setItem(LS_ACTIVE, JSON.stringify(activeKeys));
  localStorage.setItem(LS_BIDI, JSON.stringify(bidirectional));
  localStorage.setItem(LS_METERNR, JSON.stringify(meterNumbers));
  localStorage.setItem(LS_PRICES, JSON.stringify(prices));
  localStorage.setItem(LS_PRICES_AB, JSON.stringify(pricesAb));
  if(activeKeys.length === 0){
    activeKeys = ["strom"];
    localStorage.setItem(LS_ACTIVE, JSON.stringify(activeKeys));
  }
  updateActiveUtilities();
  if (!activeKeys.includes(currentUtil)) {
    currentUtil = activeKeys[0];
    localStorage.setItem(LS_UTIL, currentUtil);
  }
  renderSettings();
  renderPrices();
  renderFormInputs();
  renderAll();
}

function renderPrices() {
  const container = document.getElementById("settings_prices");
  container.innerHTML = "";
  for (const k of activeKeys) {
    const u = UTILITIES[k];
    if(!u) continue;
    const isBidi = bidirectional.includes(k);
    const val = prices[k] !== undefined ? String(prices[k]).replace(".", ",") : "";
    container.innerHTML += `
      <div>
        <label for="p_${k}">${u.label}${isBidi ? " Bezug" : ""} (€/${u.einheit})</label>
        <input id="p_${k}" inputmode="decimal" placeholder="z. B. 0,35" value="${val}" onchange="savePrice('${k}', this.value)">
      </div>
    `;
    if(isBidi){
      const valAb = pricesAb[k] !== undefined ? String(pricesAb[k]).replace(".", ",") : "";
      container.innerHTML += `
        <div>
          <label for="pab_${k}">${u.label} Einspeisung (€/${u.einheit})</label>
          <input id="pab_${k}" inputmode="decimal" placeholder="z. B. 0,08" value="${valAb}" onchange="savePriceAb('${k}', this.value)">
        </div>
      `;
    }
  }
}

function savePrice(k, val) {
  const num = parseNumber(val);
  if (num !== null) {
    prices[k] = num;
  } else {
    delete prices[k];
  }
  localStorage.setItem(LS_PRICES, JSON.stringify(prices));
  renderAll();
}

function savePriceAb(k, val) {
  const num = parseNumber(val);
  if (num !== null) {
    pricesAb[k] = num;
  } else {
    delete pricesAb[k];
  }
  localStorage.setItem(LS_PRICES_AB, JSON.stringify(pricesAb));

}

}

function renderStats(){
  const box = document.getElementById("stats");
  const per = getFilteredPeriods();
  const meta = UTILITIES[currentUtil];
  const u = meta.einheit;
  const isBidi = bidirectional.includes(currentUtil);

  function stat(v,l){ return '<div class="stat"><b>' + v + "</b><span>" + l + "</span></div>"; }

  if(!isBidi){
    const rows = per.filter(p => p[currentUtil] !== null);
    if(!rows.length){ box.innerHTML = ""; return; }
    const total = rows.reduce((s,p)=> s+p[currentUtil], 0);
    const days  = rows.reduce((s,p)=> s+p.tage, 0);
    const last  = rows[rows.length-1];
    let html =
      stat(fmt(days ? total/days : 0, 2) + " " + u, "Ø pro Tag") +
      stat(fmt(last[currentUtil]) + " " + u, "Letzter Zeitraum (" + last.tage + " Tage)") +
      stat(fmt(total) + " " + u, "Gesamt erfasst");
    const price = prices[currentUtil];
    if (price !== undefined) html += stat(fmt(total*price, 2) + " €", "Kosten (Gesamt)");
    box.innerHTML = html;
  }else{
    const rowsB = per.filter(p => p[currentUtil] !== null);
    const rowsAb = per.filter(p => p[currentUtil+"_ab"] !== null);
    if(!rowsB.length && !rowsAb.length){ box.innerHTML = ""; return; }
    const totalB = rowsB.reduce((s,p)=> s+p[currentUtil], 0);
    const totalAb = rowsAb.reduce((s,p)=> s+p[currentUtil+"_ab"], 0);
    const days = (rowsB.length ? rowsB : rowsAb).reduce((s,p)=> s+p.tage, 0);
    const netto = totalB - totalAb;
    let html =
      stat(fmt(totalB) + " " + u, "Bezug gesamt") +
      stat(fmt(totalAb) + " " + u, "Einspeisung gesamt") +
      stat(fmt(netto) + " " + u, "Netto (Bezug − Einspeisung)") +
      stat(fmt(days ? netto/days : 0, 2) + " " + u, "Ø Netto pro Tag");
    const priceB = prices[currentUtil];
    const priceAb = pricesAb[currentUtil];
    if(priceB !== undefined) html += stat(fmt(totalB*priceB, 2) + " €", "Kosten Bezug");
    if(priceAb !== undefined) html += stat(fmt(totalAb*priceAb, 2) + " €", "Vergütung Einspeisung");
    if(priceB !== undefined && priceAb !== undefined)
      html += stat(fmt(totalB*priceB - totalAb*priceAb, 2) + " €", "Kosten Netto");
    box.innerHTML = html;
  }
}

function buildSeriesSvg(pts, color, X, Y){
  if(pts.length < 2) return "";
  const line = pts.map((p,i)=>(i?"L":"M")+X(p.x).toFixed(1)+" "+Y(p.y).toFixed(1)).join(" ");
  const area = line + ` L${X(pts[pts.length-1].x).toFixed(1)} ${Y(0)} L${X(pts[0].x).toFixed(1)} ${Y(0)} Z`;
  const dots = pts.map(p=>`<circle cx="${X(p.x).toFixed(1)}" cy="${Y(p.y).toFixed(1)}" r="3.2" fill="${color}"/>`).join("");
  return `<path d="${area}" fill="${color}" opacity="0.13"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
}

function renderChart(){
  const box = document.getElementById("chartbox");
  const meta = UTILITIES[currentUtil];
  const isBidi = bidirectional.includes(currentUtil);
  const periods = getFilteredPeriods();

  const ptsB = periods.filter(p => p[currentUtil] !== null && p[currentUtil] !== undefined)
      .map(p => ({x:new Date(p.datum).getTime(), y:p[currentUtil], d:p.datum}));
  const ptsAb = isBidi ? periods.filter(p => p[currentUtil+"_ab"] !== null && p[currentUtil+"_ab"] !== undefined)
      .map(p => ({x:new Date(p.datum).getTime(), y:p[currentUtil+"_ab"], d:p.datum})) : [];

  if(ptsB.length < 2 && ptsAb.length < 2){
    box.innerHTML = '<div class="empty">Ab zwei Ablesungen mit Verbrauchswerten erscheint hier das Diagramm.</div>';
    if(ptsB.length + ptsAb.length === 1)
      box.querySelector(".empty").textContent =
        "Erster Verbrauchswert erfasst – ab der nächsten Ablesung erscheint hier der Verlauf.";
    return;
  }

  const W=600, H=230, L=52, R=14, T=16, B=34;
  const allPts = ptsB.concat(ptsAb);
  const xmin = Math.min(...allPts.map(p=>p.x));
  const xmax = Math.max(...allPts.map(p=>p.x));
  let ymax = Math.max(...allPts.map(p=>p.y)); if(ymax<=0) ymax = 1;
  ymax *= 1.15;
  const X = t => L + (t-xmin)/(xmax-xmin||1)*(W-L-R);
  const Y = v => T + (1 - v/ymax)*(H-T-B);
  const css = getComputedStyle(document.documentElement);
  const cAcc = utilColorValue(currentUtil);
  const cGrid = css.getPropertyValue("--line").trim();
  const cMut = css.getPropertyValue("--muted").trim();

  const step = niceStep(ymax/4);
  let grid="", labels="";
  for(let v=step; v<=ymax; v+=step){
    const y = Y(v);
    grid += `<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="${cGrid}" stroke-width="1"/>`;
    labels += `<text x="${L-6}" y="${y+3}" text-anchor="end" font-size="10" fill="${cMut}">${fmt(v,0)}</text>`;
  }
  const labelSrc = ptsB.length ? ptsB : ptsAb;
  const n = Math.min(6, labelSrc.length);
  for(let i=0; i<n; i++){
    const p = labelSrc[Math.round(i*(labelSrc.length-1)/(n-1||1))];
    const [y,m] = p.d.split("-");
    labels += `<text x="${X(p.x)}" y="${H-10}" text-anchor="middle" font-size="10" fill="${cMut}">${m}/${y.slice(2)}</text>`;
  }

  const seriesB = buildSeriesSvg(ptsB, cAcc, X, Y);
  const seriesAb = isBidi ? buildSeriesSvg(ptsAb, CHART_COLOR_AB, X, Y) : "";
  let legend = "";
  if(isBidi){
    legend = `<circle cx="${W-176}" cy="26" r="4" fill="${cAcc}"/><text x="${W-168}" y="29" font-size="10" fill="${cMut}">Bezug</text>
              <circle cx="${W-100}" cy="26" r="4" fill="${CHART_COLOR_AB}"/><text x="${W-92}" y="29" font-size="10" fill="${cMut}">Einspeisung</text>`;
  }

  box.innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
       <text x="${L}" y="11" font-size="11" font-weight="700" fill="${cMut}">${meta.label} – je Ableseperiode (${meta.einheit})</text>
       ${grid}
       ${seriesB}${seriesAb}${labels}${legend}
     </svg>`;
}
function niceStep(raw){
  const p = Math.pow(10, Math.floor(Math.log10(raw||1)));
  for(const m of [1,2,2.5,5,10]) if(raw <= m*p) return m*p;
  return 10*p;
}

function renderList(){
  const list = document.getElementById("list");

  document.getElementById("count").textContent =
    fReadings.length ? "(" + fReadings.length + ")" : "";

  if(!fReadings.length){
    list.innerHTML = '<div class="empty">Im gewählten Zeitraum gibt es keine Einträge.</div>';
    return;
  }

  const per = {};
  for(const p of computeConsumption()) per[p.datum] = p;

  let html = "";
  for(let i=fReadings.length-1; i>=0; i--){
    const r = fReadings[i], p = per[r.datum];
    html += '<div class="entry"><div class="head"><b>' + deDate(r.datum) + "</b><span>" +
            (p ? p.tage + " Tage seit letzter Ablesung" : "Erste Ablesung") +
            '</span><button class="del" title="Eintrag löschen" aria-label="Eintrag löschen" data-d="' +
            r.datum + '">✕</button></div><div class="vals">';
    for(const k of KEYS){
      const m = UTILITIES[k];
      const color = utilColorValue(k);
      if(bidirectional.includes(k)){
        let subB = "";
        if(p){
          if(p[k+"_wechsel"]) subB = '<i class="wechsel">Zählerwechsel</i>';
          else if(p[k] !== null) subB = `<i style="color:${color}">+ ${fmt(p[k])} ${m.einheit}</i>`;
        }
        html += '<div class="val"><small>' + m.label + " Bezug</small><b>" + fmt(r[k]) + "</b>" + subB + "</div>";
        let subAb = "";
        if(p){
          if(p[k+"_ab_wechsel"]) subAb = '<i class="wechsel">Zählerwechsel</i>';
          else if(p[k+"_ab"] !== null) subAb = `<i style="color:${CHART_COLOR_AB}">+ ${fmt(p[k+"_ab"])} ${m.einheit}</i>`;
        }
        html += '<div class="val"><small>' + m.label + " Einspeisung</small><b>" + fmt(r[k+"_ab"]) + "</b>" + subAb + "</div>";
      }else{
        let sub = "";
        if(p){
          if(p[k+"_wechsel"]) sub = '<i class="wechsel">Zählerwechsel</i>';
          else if(p[k] !== null) sub = `<i style="color:${color}">+ ${fmt(p[k])} ${m.einheit}</i>`;
        }
        html += '<div class="val"><small>' + m.label + "</small><b>" + fmt(r[k]) + "</b>" + sub + "</div>";
      }
    }
    html += "</div></div>";
  }
  list.innerHTML = html;
  list.querySelectorAll(".del").forEach(b => b.onclick = () => deleteReading(b.dataset.d));
}

function renderAll(){ renderSeg(); renderMeterInfo(); renderStats(); renderChart(); renderList(); }

/* ---------- Export-Spalten (berücksichtigen Zweirichtungszähler) ---------- */
function exportColumns(){
  const cols = [];
  for(const k of KEYS){
    if(bidirectional.includes(k)){ cols.push({k, sub:"bezug"}); cols.push({k, sub:"ab"}); }
    else cols.push({k, sub:null});
  }
  return cols;
}
function columnHeader(col){
  const m = UTILITIES[col.k];
  if(col.sub === "bezug") return `${m.label} Bezug (${m.einheit})`;
  if(col.sub === "ab") return `${m.label} Einspeisung (${m.einheit})`;
  return `${m.label} (${m.einheit})`;
}
function columnValue(row, col){
  return col.sub === "ab" ? row[col.k+"_ab"] : row[col.k];
}

/* ---------- Export / Import ---------- */
function download(name, blob){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 800);
}
function exportBackup(){
  if(!readings.length){ setStatus("Keine Daten vorhanden."); return; }
  const payload = {
    version: 2,
    readings, customUtilities, meterNumbers, bidirectional, activeKeys, prices, pricesAb
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  download("verbrauchsdaten.json", blob);
  setStatus("Sicherung erstellt.");
  flashButton("backupbtn");
}
function importBackup(file){
  const fr = new FileReader();
  fr.onload = () => {
    let raw;
    try{ raw = JSON.parse(fr.result); }
    catch(e){ alert("Die Datei konnte nicht gelesen werden (kein gültiges JSON)."); return; }

    let rawReadings, settings = null;
    if(Array.isArray(raw)){
      rawReadings = raw;
    }else if(raw && Array.isArray(raw.readings)){
      rawReadings = raw.readings;
      settings = raw;
    }else{
      alert("Die Datei enthält keine gültigen Einträge."); return;
    }

    if(settings){
      customUtilities = Object.assign({}, customUtilities, settings.customUtilities || {});
      meterNumbers = Object.assign({}, meterNumbers, settings.meterNumbers || {});
      bidirectional = Array.from(new Set([...bidirectional, ...(settings.bidirectional || [])]));
      prices = Object.assign({}, prices, settings.prices || {});
      pricesAb = Object.assign({}, pricesAb, settings.pricesAb || {});
      if(Array.isArray(settings.activeKeys)) activeKeys = Array.from(new Set([...activeKeys, ...settings.activeKeys]));
      localStorage.setItem(LS_CUSTOM, JSON.stringify(customUtilities));
      localStorage.setItem(LS_METERNR, JSON.stringify(meterNumbers));
      localStorage.setItem(LS_BIDI, JSON.stringify(bidirectional));
      localStorage.setItem(LS_ACTIVE, JSON.stringify(activeKeys));
      localStorage.setItem(LS_PRICES, JSON.stringify(prices));
      localStorage.setItem(LS_PRICES_AB, JSON.stringify(pricesAb));
      updateActiveUtilities();
      if (!activeKeys.includes(currentUtil)) {
        currentUtil = activeKeys[0];
        localStorage.setItem(LS_UTIL, currentUtil);
      }
    }

    const neu = sanitize(rawReadings);
    if(!neu.length){ alert("Die Datei enthält keine gültigen Einträge."); return; }
    let added = 0, replaced = 0;
    for(const n of neu){
      const ex = readings.find(r => r.datum === n.datum);
      if(ex){ Object.assign(ex, n); replaced++; }
      else { readings.push(n); added++; }
    }
    readings.sort((a,b)=> a.datum < b.datum ? -1 : 1);
    saveData();
    renderSettings(); renderPrices(); renderFormInputs(); renderAll();
    setStatus(added + " Einträge übernommen" + (replaced ? ", " + replaced + " aktualisiert." : "."));
    flashButton("importbtn");
  };
  fr.readAsText(file);
}
function exportCSV(){
  const per = computeConsumption();
  const num = v => v === null || v === undefined ? "" : String(v).replace(".",",");
  const cols = exportColumns();
  const headers = cols.map(columnHeader).join(";");

  let s = "\uFEFFZählerstände\nDatum;" + headers + "\n";
  if(cols.some(c => meterNumbers[c.k])){
    s += "Zähler-Nr.;" + cols.map(c => meterNumbers[c.k] || "").join(";") + "\n";
  }
  for(const r of readings) {
    s += deDate(r.datum) + ";" + cols.map(c => num(columnValue(r,c))).join(";") + "\n";
  }

  s += "\nVerbrauch je Zeitraum\nDatum;Tage;" + headers + "\n";
  for(const p of per) {
    s += deDate(p.datum) + ";" + p.tage + ";" + cols.map(c => num(columnValue(p,c))).join(";") + "\n";
  }

  download("Verbrauch_" + new Date().toISOString().slice(0,10) + ".csv", new Blob([s], {type:"text/csv;charset=utf-8"}));
  setStatus("Als CSV exportiert (in Excel zu öffnen).");
  flashButton("csvbtn");
}
function exportExcel(){
  if(!readings.length){ setStatus("Keine Daten zum Exportieren."); return; }
  const build = () => {
    const wb = XLSX.utils.book_new();
    const cols = exportColumns();
    const headers = cols.map(columnHeader);

    const s1 = [["Datum", ...headers]];
    if(cols.some(c => meterNumbers[c.k])) s1.push(["Zähler-Nr.", ...cols.map(c => meterNumbers[c.k] || "")]);
    for(const r of readings) s1.push([deDate(r.datum), ...cols.map(c => columnValue(r,c))]);
    const ws1 = XLSX.utils.aoa_to_sheet(s1);
    ws1["!cols"] = [{wch:12}, ...cols.map(()=>({wch:13}))];
    XLSX.utils.book_append_sheet(wb, ws1, "Zählerstände");

    const s2 = [["Datum", "Tage", ...headers]];
    for(const p of computeConsumption()) s2.push([deDate(p.datum), p.tage, ...cols.map(c => columnValue(p,c))]);
    const ws2 = XLSX.utils.aoa_to_sheet(s2);
    ws2["!cols"] = [{wch:12}, {wch:6}, ...cols.map(()=>({wch:13}))];
    XLSX.utils.book_append_sheet(wb, ws2, "Verbrauch");

    XLSX.writeFile(wb, "Verbrauch_" + new Date().toISOString().slice(0,10) + ".xlsx");
    setStatus("Excel-Datei erstellt.");
    flashButton("xlsxbtn");
  };
  if(window.XLSX){ build(); return; }
  setStatus("Lade Excel-Modul …");
  const sc = document.createElement("script");
  sc.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
  sc.onload = build;
  sc.onerror = () => {
    if(confirm("Für den Excel-Export wird einmalig eine Internetverbindung benötigt.\nStattdessen als CSV-Datei exportieren (funktioniert offline, in Excel zu öffnen)?"))
      exportCSV();
    else setStatus("");
  };
  document.head.appendChild(sc);
}

/* ---------- Theme ---------- */
function setAccent(){
  const c = utilColorValue(currentUtil);
  document.documentElement.style.setProperty("--accent", c);
  document.documentElement.style.setProperty("--accent-soft", c + "24");
}
function applyTheme(t){
  const dark = t === "dark" || (t === "system" &&
    window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches);
  document.documentElement.dataset.theme = dark ? "dark" : "light";
  setAccent(); renderStats(); renderChart();
}
function toggleTheme(){
  const cur = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem(LS_THEME, cur);
  applyTheme(cur);
}
